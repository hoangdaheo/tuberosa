services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tuberosa
      POSTGRES_USER: tuberosa
      POSTGRES_PASSWORD: tuberosa
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - tuberosa-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuberosa -d tuberosa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tuberosa-postgres:
