services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tuberosa
      POSTGRES_USER: tuberosa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tuberosa}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuberosa -d tuberosa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3027
      TUBEROSA_HTTP_HOST: 0.0.0.0
      TUBEROSA_API_KEY: ${TUBEROSA_API_KEY:-}
      TUBEROSA_REQUIRE_API_KEY_FOR_NON_LOOPBACK: ${TUBEROSA_REQUIRE_API_KEY_FOR_NON_LOOPBACK:-false}
      DATABASE_URL: postgres://tuberosa:${POSTGRES_PASSWORD:-tuberosa}@postgres:5432/tuberosa
      REDIS_URL: redis://redis:6379
      TUBEROSA_STORE: postgres
      TUBEROSA_CACHE: redis
      TUBEROSA_MODEL_PROVIDER: ${TUBEROSA_MODEL_PROVIDER:-hash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
      TUBEROSA_MAX_REQUEST_BYTES: ${TUBEROSA_MAX_REQUEST_BYTES:-10485760}
      TUBEROSA_MAX_INGEST_CONTENT_BYTES: ${TUBEROSA_MAX_INGEST_CONTENT_BYTES:-2097152}
      TUBEROSA_BACKUP_DIR: /data/backups
    ports:
      - "127.0.0.1:3027:3027"
    volumes:
      - ./.tuberosa/backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/scripts/migrate.js && node dist/src/index.js"

  worker:
    build: .
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://tuberosa:${POSTGRES_PASSWORD:-tuberosa}@postgres:5432/tuberosa
      REDIS_URL: redis://redis:6379
      TUBEROSA_STORE: postgres
      TUBEROSA_CACHE: redis
      TUBEROSA_MODEL_PROVIDER: ${TUBEROSA_MODEL_PROVIDER:-hash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
      TUBEROSA_MAX_REQUEST_BYTES: ${TUBEROSA_MAX_REQUEST_BYTES:-10485760}
      TUBEROSA_MAX_INGEST_CONTENT_BYTES: ${TUBEROSA_MAX_INGEST_CONTENT_BYTES:-2097152}
      TUBEROSA_BACKUP_DIR: /data/backups
    volumes:
      - ./.tuberosa/backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/scripts/migrate.js && node dist/src/worker.js"

volumes:
  postgres-data:
