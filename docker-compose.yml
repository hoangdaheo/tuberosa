services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tuberosa
      POSTGRES_USER: tuberosa
      POSTGRES_PASSWORD: tuberosa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuberosa -d tuberosa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3027
      DATABASE_URL: postgres://tuberosa:tuberosa@postgres:5432/tuberosa
      REDIS_URL: redis://redis:6379
      TUBEROSA_STORE: postgres
      TUBEROSA_CACHE: redis
      TUBEROSA_MODEL_PROVIDER: ${TUBEROSA_MODEL_PROVIDER:-hash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
    ports:
      - "3027:3027"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/scripts/migrate.js && node dist/src/index.js"

  worker:
    build: .
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://tuberosa:tuberosa@postgres:5432/tuberosa
      REDIS_URL: redis://redis:6379
      TUBEROSA_STORE: postgres
      TUBEROSA_CACHE: redis
      TUBEROSA_MODEL_PROVIDER: ${TUBEROSA_MODEL_PROVIDER:-hash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/scripts/migrate.js && node dist/src/worker.js"

volumes:
  postgres-data:
